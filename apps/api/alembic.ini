# Alembic configuration for OMISPHERE.
#
# Today's policy: migrations are advisory. The default boot flow still uses
# Base.metadata.create_all + the _INCREMENTAL_COLUMNS hook in
# app/storage/db.py so existing deploys don't need to backfill an Alembic
# state row before they upgrade. Operators wanting safer schema evolution
# can run:
#
#     cd apps/api
#     alembic stamp head     # first time: tell Alembic the existing schema is at head
#     alembic upgrade head   # subsequently: apply any new migrations
#
# When everyone's caught up we'll flip the boot flow to call
# `alembic upgrade head` automatically and retire _INCREMENTAL_COLUMNS.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Read the URL from the env var at runtime instead of hard-coding here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
