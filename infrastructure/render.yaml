# OMISPHERE — Render Blueprint
#
# Provisions both services + database in one click:
#   - omisphere-web      (Next.js 14)
#   - omisphere-api      (FastAPI / omi engine)
#   - omisphere-postgres (Postgres database)
#
# After connecting this repo to Render and clicking "New Blueprint":
#   1. Render creates all three resources.
#   2. DATABASE_URL is auto-wired from omisphere-postgres into the api.
#   3. Fill in the remaining `sync: false` env vars in the dashboard.
#   4. Add your custom domain to omisphere-web; point omisphere-api at it
#      under a subdomain (e.g. api.yourdomain.com).
#
# Stripe webhook URL to register:
#   https://api.yourdomain.com/v1/billing/webhook

services:
  # ---------------------------------------------------------------
  # API — FastAPI
  # ---------------------------------------------------------------
  - type: web
    name: omisphere-api
    runtime: python
    region: oregon
    plan: starter
    branch: main
    rootDir: apps/api
    buildCommand: pip install -e .[youtube,postgres]
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: OMI_ENV
        value: production
      - key: OMI_REQUIRE_AUTH
        value: 'true'
      - key: OMI_LOG_LEVEL
        value: INFO
      - key: OMI_DATABASE_URL
        fromDatabase:
          name: omisphere-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: '3.11.9'
      - key: OMI_MONTHLY_CREDIT_GRANT
        value: '20'
      - key: OMI_FREE_TRIAL_CREDITS
        value: '3'
      - key: OMI_SUPER_ADMIN_EMAILS
        value: 'andrewexiga@gmail.com'
      - key: OMI_SCAN_MAX_COMMENTERS
        value: '150'
      - key: OMI_SCAN_MAX_HISTORY_PER_COMMENTER
        value: '50'
      - key: OMI_SCAN_CACHE_TTL_DAYS
        value: '7'
      # Manual-fill in dashboard
      - key: OMI_YOUTUBE_API_KEY
        sync: false
      - key: OMI_STRIPE_SECRET_KEY
        sync: false
      - key: OMI_STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OMI_STRIPE_PRICE_ID
        sync: false
      # SMTP for watchlist alert email delivery. Optional — webhook delivery
      # works without these and the product remains functional. Recommended
      # providers (any will work, just need standard SMTP creds):
      #   * Resend  — smtp.resend.com:465 (TLS), user="resend"
      #   * AWS SES — email-smtp.us-east-1.amazonaws.com:587 (STARTTLS)
      #   * Postmark — smtp.postmarkapp.com:587 (STARTTLS)
      # After setting these, hit POST /v1/monitoring/test-alert from an
      # admin account to verify delivery.
      - key: OMI_SMTP_HOST
        sync: false
      - key: OMI_SMTP_PORT
        value: '587'
      - key: OMI_SMTP_USER
        sync: false
      - key: OMI_SMTP_PASSWORD
        sync: false
      - key: OMI_SMTP_FROM
        sync: false
      - key: OMI_SMTP_USE_TLS
        value: 'true'
      # Auto-generated by Render on first provision; stays stable across
      # deploys so issued session cookies aren't invalidated.
      - key: OMI_SESSION_SECRET
        generateValue: true
      - key: OMI_PUBLIC_BASE_URL
        sync: false

  # ---------------------------------------------------------------
  # Web — Next.js
  # ---------------------------------------------------------------
  - type: web
    name: omisphere-web
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: '20.18.0'
      - key: OMI_API_ORIGIN
        fromService:
          name: omisphere-api
          type: web
          property: hostport
      - key: OMI_PUBLIC_BASE_URL
        sync: false

databases:
  - name: omisphere-postgres
    plan: starter
    region: oregon
    databaseName: omi
    user: omi
