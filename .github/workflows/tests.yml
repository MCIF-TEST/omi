name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on a branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API · pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install dependencies
        run: pip install -e .[dev,youtube]
      - name: Run pytest
        run: pytest -q

  web:
    name: Web · typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          OMI_API_ORIGIN: http://127.0.0.1:8000
          OMI_PUBLIC_BASE_URL: http://localhost:3000
